software: zemax
task_type: parameter_sweep
model_file: Double_Gauss_28_degree_field.zmx

target:
  surface: 6
  parameter: thickness
  unit: mm
  start: -1.0
  end: 1.0
  step: 0.2

metrics:
  - MTF_30lpmm
  - MTF_50lpmm
  - RMS_Spot

outputs:
  - csv
  - figures
  - best_design
  - report

safety:
  read_only_original_model: true
  output_dir: results/D30_double_gauss_sweep
  dry_run_first: true
  max_runs: 20