# configs/config_zemax.yaml

project:
  name: zemax_thickness_sweep_demo
  description: D23 配置文件驱动测试
  dry_run: true

zemax:
  mode: standalone
  model_file: models/Double_Gauss_28_degree_field.zmx
  save_model: true

sweep:
  surface_id: 6
  parameter: thickness
  unit: mm
  start: -1.0
  end: 1.0
  step: 0.1

analysis:
  metrics:
    - MTF_30
    - MTF_50
    - RMS_Spot

score:
  mtf_50_weight: 1.0
  rms_spot_weight: 0.1

output:
  root_dir: results
  task_name: zemax_thickness_sweep_demo
  # 换任务只改这个名字比如：task_name: cooke_triplet_surface6_sweep
  use_date_prefix: true

  subfolders:
    csv: csv
    figures: figures
    models: models
    logs: logs
    reports: reports

  csv_name: sweep_results.csv
  status_csv_name: run_status.csv
  figure_name: mtf50_vs_thickness.png
  log_name: run.log
  config_backup_name: config_used.yaml


debug:
  simulate_failure: false
  fail_at_index: 3