# D15: Cooke lens thickness sweep configuration

project:
  name: D15_cooke_surface3_thickness_sweep
  description: Sweep Surface 3 thickness of Cooke 40 degree field lens and export MTF/Spot results.

software:
  name: Ansys Zemax OpticStudio
  api: ZOS-API
  mode: Standalone
  language: Python

model:
  lens_file: Cooke 40 degree field.zmx
  model_type: Sequential
  keep_original: true

sweep:
  target_editor: LDE
  surface_id: 3
  parameter: Thickness
  unit: mm
  mode: delta_from_original
  start_delta: -1.0
  end_delta: 1.0
  step: 0.25
  note: actual_thickness = original_thickness + delta

analysis:
  - FFT_MTF
  - Standard_Spot

outputs:
  output_dir: results\D15_sweep_define
  save_models: true
  export_lde_csv: true
  export_mtf_txt: true
  export_spot_txt: true
  later_export_summary_csv: true

evaluation:
  main_metric: MTF
  auxiliary_metric: Spot
  compare_rule: Same model, same field, same wavelength, same analysis settings.
  note: D15 only defines the sweep problem; metric extraction will be implemented in D17.
