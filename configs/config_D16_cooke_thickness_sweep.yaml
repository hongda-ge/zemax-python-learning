# D16: Cooke lens thickness sweep configuration

project:
  name: D16_cooke_surface3_thickness_sweep
  description: Automatically sweep Surface 3 thickness of Cooke lens and export MTF/Spot results.

software:
  name: Ansys Zemax OpticStudio
  api: ZOS-API
  mode: Standalone
  language: Python

model:
  lens_file: 'C:\Users\20181\Documents\Zemax\Samples\Sequential\Objectives\Cooke 40 degree field.zmx'
  model_type: Sequential
  keep_original: true

sweep:
  target_editor: LDE
  surface_id: 3
  parameter: Thickness
  unit: mm
  mode: delta_from_original
  start_delta: -1.0
  end_delta: 1.0
  step: 0.2
  note: actual_thickness = original_thickness + delta

analysis:
  export_fft_mtf: true
  export_standard_spot: true
  export_lde_csv: true
  save_models: true

outputs:
  output_dir: 'C:\Users\20181\Desktop\Zemax\02_zosapi_python\results\D16_thickness_sweep'
  summary_csv: 'D16_sweep_summary.csv'